<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pokelens</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #1a1a2e;
        color: #eee;
        padding: 16px;
      }
      #error-message {
        display: none;
        background: #c0392b;
        color: #fff;
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-weight: bold;
      }
      #app {
        display: flex;
        gap: 24px;
      }
      #own-side {
        flex: 1;
      }
      #opponent-side {
        flex: 1;
      }
      h2 {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #own-party {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }
      .pokemon-card {
        background: #16213e;
        border: 2px solid #0f3460;
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
        transition: border-color 0.15s;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
        height: 64px;
      }
      .pokemon-card:hover {
        border-color: #e94560;
      }
      .pokemon-card.selected {
        border-color: #e94560;
        background: #1f2f5a;
      }
      .pokemon-card .name {
        font-size: 14px;
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pokemon-card .types {
        font-size: 12px;
        color: #aaa;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pokemon-card .error {
        font-size: 12px;
        color: #e74c3c;
      }
      #own-detail {
        display: none;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        padding: 16px;
        min-height: 80px;
      }
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid #0f3460;
      }
      .detail-header .name {
        font-size: 18px;
        font-weight: bold;
      }
      .detail-header .types {
        font-size: 13px;
        color: #aaa;
      }
      .detail-row {
        font-size: 13px;
        margin-bottom: 4px;
      }
      .detail-stats {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        margin: 8px 0 12px;
        color: #ddd;
      }
      .detail-moves {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .detail-moves th,
      .detail-moves td {
        padding: 6px 8px;
        text-align: left;
        border-bottom: 1px solid #0f3460;
      }
      .detail-moves th {
        color: #aaa;
        font-weight: normal;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .detail-moves td.power-index {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        text-align: right;
        font-weight: bold;
      }
      #opponent-party {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }
      .opponent-card {
        position: relative;
      }
      .opponent-clear {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 20px;
        height: 20px;
        padding: 0;
        background: #0f3460;
        color: #eee;
        border: none;
        border-radius: 50%;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
      }
      .opponent-clear:hover {
        background: #e94560;
      }
      .opponent-clear[hidden] {
        display: none;
      }
      .opponent-card .name {
        font-size: 14px;
        font-weight: bold;
      }
      .opponent-card .types {
        font-size: 12px;
        color: #aaa;
      }
      .opponent-info[hidden] {
        display: none;
      }
      #opponent-detail {
        display: none;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        padding: 16px;
        min-height: 80px;
      }
      .speed-patterns {
        list-style: none;
        margin: 4px 0 0;
        padding: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }
      .speed-patterns li {
        padding: 2px 0;
        color: #ddd;
      }
      .speed-patterns .label {
        color: #aaa;
        margin-right: 8px;
      }
      .detail-section-title {
        font-size: 11px;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 12px;
        margin-bottom: 4px;
      }
      .search-input {
        position: relative;
      }
      .search-input .opp-input {
        width: 100%;
        padding: 6px 8px;
        background: #1a2540;
        color: #eee;
        border: 1px solid #0f3460;
        border-radius: 4px;
        font-size: 13px;
        font-family: inherit;
      }
      .search-input .opp-input:focus {
        outline: none;
        border-color: #e94560;
      }
      .suggest-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        list-style: none;
        margin: 2px 0 0;
        padding: 0;
        background: #1f2f5a;
        border: 1px solid #0f3460;
        border-radius: 6px;
        z-index: 10;
        max-height: 280px;
        overflow-y: auto;
      }
      .suggest-list[hidden] {
        display: none;
      }
      .suggest-item {
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .suggest-item:hover,
      .suggest-item.is-hover {
        background: #0f3460;
      }
      .suggest-item.is-not-found {
        color: #888;
        cursor: default;
      }
      .suggest-item.is-not-found:hover {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="error-message"></div>
    <div id="app">
      <div id="own-side">
        <h2>自分パーティ</h2>
        <div id="own-party"></div>
        <div id="own-detail"></div>
      </div>
      <div id="opponent-side">
        <h2>相手パーティ</h2>
        <div id="opponent-party"></div>
        <div id="opponent-detail"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
