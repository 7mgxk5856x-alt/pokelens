<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pokelens</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #1a1a2e;
        color: #eee;
        padding: 16px;
      }
      #error-message {
        display: none;
        background: #c0392b;
        color: #fff;
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-weight: bold;
      }
      #app {
        display: flex;
        gap: 24px;
      }
      #own-side {
        flex: 1;
      }
      #opponent-side {
        flex: 1;
      }
      h2 {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #own-party {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }
      .pokemon-card {
        background: #16213e;
        border: 2px solid #0f3460;
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .pokemon-card:hover {
        border-color: #e94560;
      }
      .pokemon-card.selected {
        border-color: #e94560;
        background: #1f2f5a;
      }
      .pokemon-card .name {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .pokemon-card .types {
        font-size: 12px;
        color: #aaa;
      }
      .pokemon-card .error {
        font-size: 12px;
        color: #e74c3c;
      }
      #own-detail {
        display: none;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        padding: 16px;
        min-height: 80px;
      }
      .detail-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid #0f3460;
      }
      .detail-header .name {
        font-size: 18px;
        font-weight: bold;
      }
      .detail-header .types {
        font-size: 13px;
        color: #aaa;
      }
      .detail-row {
        font-size: 13px;
        margin-bottom: 4px;
      }
      .detail-stats {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        margin: 8px 0 12px;
        color: #ddd;
      }
      .detail-moves {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .detail-moves th,
      .detail-moves td {
        padding: 6px 8px;
        text-align: left;
        border-bottom: 1px solid #0f3460;
      }
      .detail-moves th {
        color: #aaa;
        font-weight: normal;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .detail-moves td.power-index {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        text-align: right;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="error-message"></div>
    <div id="app">
      <div id="own-side">
        <h2>自分パーティ</h2>
        <div id="own-party"></div>
        <div id="own-detail"></div>
      </div>
      <div id="opponent-side">
        <h2>相手パーティ</h2>
        <div id="opponent-party"></div>
        <div id="opponent-detail"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
